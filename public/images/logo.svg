<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 72" fill="none" role="img" aria-label="JAKAMO ARCHITECT">
  <defs>
    <filter id="bracket-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bracket-glow-soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
    </filter>
  </defs>

  <!-- Outer border -->
  <rect x="0.5" y="0.5" width="479" height="71" stroke="#00d4ff" stroke-width="0.75" stroke-opacity="0.2"/>

  <!-- Left bracket [ — glow halo -->
  <path d="M 22 11 L 11 11 L 11 61 L 22 61" stroke="#00d4ff" stroke-width="6" stroke-opacity="0.25" stroke-linecap="square" filter="url(#bracket-glow-soft)"/>
  <!-- Left bracket [ — sharp -->
  <path d="M 22 11 L 11 11 L 11 61 L 22 61" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="square" filter="url(#bracket-glow)"/>

  <!-- Right bracket ] — glow halo -->
  <path d="M 458 11 L 469 11 L 469 61 L 458 61" stroke="#00d4ff" stroke-width="6" stroke-opacity="0.25" stroke-linecap="square" filter="url(#bracket-glow-soft)"/>
  <!-- Right bracket ] — sharp -->
  <path d="M 458 11 L 469 11 L 469 61 L 458 61" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="square" filter="url(#bracket-glow)"/>

  <!-- JAKAMO -->
  <text x="34" y="45"
    font-family="'Space Grotesk', ui-sans-serif, sans-serif"
    font-weight="700"
    font-size="30"
    letter-spacing="6"
    fill="#ffffff">JAKAMO</text>

  <!-- // separator -->
  <text x="198" y="45"
    font-family="'Space Grotesk', ui-sans-serif, sans-serif"
    font-weight="300"
    font-size="30"
    letter-spacing="0"
    fill="#00d4ff"
    filter="url(#bracket-glow)">//</text>

  <!-- ARCHITECT -->
  <text x="240" y="45"
    font-family="'Space Grotesk', ui-sans-serif, sans-serif"
    font-weight="700"
    font-size="30"
    letter-spacing="4"
    fill="#e5e2e1">ARCHITECT</text>
</svg>
